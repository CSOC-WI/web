# ─────────────────────────────────────────────
#  Rate Limiting Zones
# ─────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=strict:10m  rate=5r/s;

# ─────────────────────────────────────────────
#  HTTP → HTTPS Redirect
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name securitylifecycle.one.th www.securitylifecycle.one.th;
    server_tokens off;
    return 301 https://securitylifecycle.one.th$request_uri;
}

# ─────────────────────────────────────────────
#  HTTPS Main Server
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name securitylifecycle.one.th www.securitylifecycle.one.th;

    root  /usr/share/nginx/html;
    index index.html;

    # ── SSL Certificate ──────────────────────
    ssl_certificate     /etc/nginx/ssl/star_one_th.crt;
    ssl_certificate_key /etc/nginx/ssl/Private_key_star_one_th.key;

    # ── SSL Hardening ────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── OCSP Stapling ─────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    server_tokens off;

    # ── Gzip ─────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─────────────────────────────────────────
    #  Security Headers
    # ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
        always;
    # CSP — #4: unsafe-inline kept for style-src (Tailwind CDN requires it)
    #        #5: CDN domains kept but should add SRI hashes to <script> tags
    #        #6: removed 'https:' from img-src — only allow specific domains
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net;
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;
         font-src    'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;
         img-src     'self' data: https://images.unsplash.com;
         connect-src 'self';
         frame-ancestors 'none';"
        always;

    # ─────────────────────────────────────────
    #  Block Sensitive Paths
    # ─────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 403;
    }
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist|env)$ {
        deny all;
        return 403;
    }
    location ~* \.(xlsx?|docx?|pptx?)$ {
        deny all;
        return 403;
    }

    # ─────────────────────────────────────────
    #  Uploaded images — served from shared Docker volume
    # ─────────────────────────────────────────
    # #3: Upload dir hardening — only allow known image extensions
    location ~* ^/uploads/.+\.(?:jpe?g|png|gif|webp)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
        add_header Content-Disposition "inline" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'none'; style-src 'unsafe-inline'" always;
        try_files $uri =404;
    }

    # Block all non-image files in /uploads/
    location /uploads/ {
        return 403;
    }


    # ─────────────────────────────────────────
    #  API Reverse Proxy — /api/*
    #  Use Docker internal DNS (127.0.0.11) for dynamic upstream resolution
    #  so Nginx won't crash if slc-api isn't ready at startup
    # ─────────────────────────────────────────
    location /api/ {
        limit_req zone=strict burst=20 nodelay;

        # Docker internal DNS resolver — resolves container names dynamically
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream http://slc-api:3000;

        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;

        add_header Cache-Control "no-store" always;
    }

    # ─────────────────────────────────────────
    #  Admin Panel — JWT handled by the app
    # ─────────────────────────────────────────
    location = /admin.html {
        limit_req zone=strict burst=5 nodelay;
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options        "DENY"        always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Login page — public (no auth needed)
    location = /login.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options        "DENY"        always;
        add_header X-Content-Type-Options "nosniff"     always;
        add_header Referrer-Policy        "no-referrer" always;
    }

    # ─────────────────────────────────────────
    #  Rate Limiting (general)
    # ─────────────────────────────────────────
    limit_req zone=general burst=20 delay=10;

    # ─────────────────────────────────────────
    #  Static Asset Caching
    # ─────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # ─────────────────────────────────────────
    #  HTML Pages
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header X-XSS-Protection       "1; mode=block"                   always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy
            "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
            always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: https://images.unsplash.com; connect-src 'self'; frame-ancestors 'none';" always;
    }

    # ─────────────────────────────────────────
    #  Custom Error Pages
    # ─────────────────────────────────────────
    error_page 403 404      /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html { internal; }
    location = /50x.html { internal; }

    # ─────────────────────────────────────────
    #  Client Limits
    # ─────────────────────────────────────────
    client_max_body_size  6m;
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;
}
