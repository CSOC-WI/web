<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — ไม่พบหน้าที่ต้องการ | SLC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background: #0A1628;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 40px 24px;
        }

        .code {
            font-size: 7rem;
            font-weight: 700;
            color: #00C896;
            line-height: 1;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        p {
            color: #9CA3AF;
            margin-bottom: 32px;
        }

        a {
            display: inline-block;
            padding: 12px 28px;
            background: #00C896;
            color: #0A1628;
            font-weight: 700;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.2s;
        }

        a:hover {
            background: #00e8ad;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="code">404</div>
        <h1>ไม่พบหน้าที่ต้องการ</h1>
        <p>หน้าที่คุณกำลังมองหาอาจถูกย้ายหรือไม่มีอยู่แล้ว</p>
        <a href="/">← กลับหน้าแรก</a>
    </div>
</body>

</html>
