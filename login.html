<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLC Admin — เข้าสู่ระบบ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #a3e9a4;
            --accent: #6bce6d;
            --dark: #0a1f12;
            --card-bg: #0f2919;
            --border: rgba(163, 233, 164, .15);
            --text: #e8f5e9;
            --text-lt: #7ab87b;
            --err: #ff6b6b;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Animated background ── */
        .bg-orbs {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .18;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 420px;
            height: 420px;
            background: #2e7d32;
            top: -100px;
            left: -120px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #1b5e20;
            bottom: -80px;
            right: -80px;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #388e3c;
            top: 50%;
            left: 60%;
            animation-delay: -8s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, 20px) scale(1.1);
            }
        }

        /* ── Grid dots background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(163, 233, 164, .06) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Login card ── */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(15, 41, 25, .85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 44px 44px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, .5), 0 0 0 1px rgba(163, 233, 164, .05);
            animation: slideUp .5s ease-out both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Brand ── */
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 36px;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 20px rgba(107, 206, 109, .3);
        }

        .brand-text h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.1;
        }

        .brand-text p {
            font-size: .75rem;
            color: var(--text-lt);
            margin-top: 2px;
        }

        /* ── Form elements ── */
        .form-label {
            display: block;
            font-size: .78rem;
            font-weight: 500;
            color: var(--text-lt);
            margin-bottom: 7px;
            letter-spacing: .04em;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 18px;
        }

        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: var(--text-lt);
            pointer-events: none;
            transition: color .2s;
        }

        .input-wrap input {
            width: 100%;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 14px 13px 42px;
            font-family: 'Prompt', sans-serif;
            font-size: .9rem;
            color: var(--text);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .input-wrap input::placeholder {
            color: rgba(138, 199, 139, .35);
        }

        .input-wrap input:focus {
            border-color: rgba(163, 233, 164, .4);
            box-shadow: 0 0 0 3px rgba(163, 233, 164, .08);
        }

        .input-wrap input:focus+i,
        .input-wrap:focus-within i {
            color: var(--accent);
        }

        /* toggle password icon */
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.05rem;
            color: var(--text-lt);
            cursor: pointer;
            pointer-events: all !important;
            transition: color .2s;
        }

        .toggle-pw:hover {
            color: var(--accent);
        }

        /* ── Error box ── */
        .error-box {
            display: none;
            background: rgba(255, 107, 107, .1);
            border: 1px solid rgba(255, 107, 107, .35);
            border-radius: 10px;
            padding: 11px 14px;
            font-size: .8rem;
            color: var(--err);
            margin-bottom: 18px;
            align-items: center;
            gap: 8px;
        }

        .error-box.show {
            display: flex;
        }

        /* ── Submit button ── */
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #2e7d32, #43a047);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: 'Prompt', sans-serif;
            font-size: .95rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all .2s;
            box-shadow: 0 4px 20px rgba(67, 160, 71, .3);
            margin-top: 8px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(67, 160, 71, .45);
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        /* spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Footer note ── */
        .login-footer {
            margin-top: 28px;
            text-align: center;
            font-size: .72rem;
            color: var(--text-lt);
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px 32px;
                margin: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- Animated background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Login card -->
    <div class="login-card" role="main">

        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">🛡️</div>
            <div class="brand-text">
                <h1>SLC Admin</h1>
                <p>Security Life Cycle — ระบบจัดการ</p>
            </div>
        </div>

        <!-- Error -->
        <div class="error-box" id="err-box" role="alert">
            <i class="ri-error-warning-line"></i>
            <span id="err-msg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
        </div>

        <!-- Form -->
        <form id="login-form" novalidate>
            <label class="form-label" for="inp-user">ชื่อผู้ใช้</label>
            <div class="input-wrap">
                <input id="inp-user" type="text" placeholder="username" autocomplete="username" required autofocus>
                <i class="ri-user-line"></i>
            </div>

            <label class="form-label" for="inp-pass">รหัสผ่าน</label>
            <div class="input-wrap">
                <input id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
                <i class="ri-lock-line"></i>
                <span class="toggle-pw" onclick="togglePw()" title="แสดง/ซ่อนรหัสผ่าน">
                    <i id="pw-eye" class="ri-eye-off-line"></i>
                </span>
            </div>

            <button class="btn-login" id="login-btn" type="submit">
                <div class="spinner" id="spinner"></div>
                <i class="ri-login-circle-line" id="login-icon"></i>
                <span id="login-text">เข้าสู่ระบบ</span>
            </button>
        </form>

        <div class="login-footer">
            🔒 การเชื่อมต่อได้รับการเข้ารหัสด้วย TLS &nbsp;|&nbsp; SLC &copy; 2025
        </div>
    </div>

    <script>
        // ── Toggle password visibility ─────────────────
        function togglePw() {
            const inp = document.getElementById('inp-pass');
            const eye = document.getElementById('pw-eye');
            if (inp.type === 'password') {
                inp.type = 'text';
                eye.className = 'ri-eye-line';
            } else {
                inp.type = 'password';
                eye.className = 'ri-eye-off-line';
            }
        }

        // ── Show / hide error ──────────────────────────
        function showError(msg) {
            const box = document.getElementById('err-box');
            document.getElementById('err-msg').textContent = msg;
            box.classList.add('show');
        }
        function hideError() {
            document.getElementById('err-box').classList.remove('show');
        }

        // ── Set loading state ──────────────────────────
        function setLoading(on) {
            document.getElementById('login-btn').disabled = on;
            document.getElementById('spinner').style.display = on ? 'block' : 'none';
            document.getElementById('login-icon').style.display = on ? 'none' : '';
            document.getElementById('login-text').textContent = on ? 'กำลังตรวจสอบ...' : 'เข้าสู่ระบบ';
        }

        // ── Submit ─────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const username = document.getElementById('inp-user').value.trim();
            const password = document.getElementById('inp-pass').value;

            if (!username || !password) {
                showError('กรุณากรอกชื่อผู้ใช้และรหัสผ่าน');
                return;
            }

            setLoading(true);
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'same-origin',
                });
                const data = await res.json().catch(() => ({}));

                if (res.ok) {
                    // Redirect to admin panel
                    window.location.replace('/admin.html');
                } else {
                    showError(data.error || 'เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่อีกครั้ง');
                }
            } catch {
                showError('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ กรุณาตรวจสอบเครือข่าย');
            } finally {
                setLoading(false);
            }
        });

        // ── If already logged in, go straight to admin ─
        (async function checkSession() {
            try {
                const r = await fetch('/api/auth/me', { credentials: 'same-origin' });
                if (r.ok) window.location.replace('/admin.html');
            } catch { /* not logged in */ }
        })();
    </script>
</body>

</html>
